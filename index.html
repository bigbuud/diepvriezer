<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vriezer">
<meta name="theme-color" content="#0a1628">
<title>Diepvriezer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:      #0a1628;
    --navy2:     #0f2040;
    --navy3:     #162d55;
    --ice:       #a8d8ea;
    --ice-pale:  #dff0f8;
    --frost:     #e8f4f8;
    --white:     #f4fafd;
    --accent:    #4fc3f7;
    --accent2:   #81d4fa;
    --gv:        #43e97b;
    --ngv:       #f7797d;
    --border:    rgba(168,216,234,0.15);
    --border2:   rgba(168,216,234,0.08);
    --glass:     rgba(15,32,64,0.7);
    --text:      #e8f4f8;
    --text-dim:  rgba(232,244,248,0.55);
    --shadow:    0 4px 32px rgba(0,0,0,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Frost background ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(79,195,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(129,212,250,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 50% 50%, rgba(10,22,40,0) 0%, rgba(10,22,40,0.4) 100%);
    pointer-events: none;
  }

  body > * { position: relative; z-index: 1; }

  /* ── LOGIN ── */
  #loginScreen {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: var(--navy);
    align-items: center; justify-content: center;
  }
  #loginScreen.active { display: flex; }

  .login-box {
    width: 360px;
    padding: 3rem 2.5rem;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    box-shadow: var(--shadow), 0 0 60px rgba(79,195,247,0.05);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 2rem;
  }
  .login-logo .icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
  .login-logo h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem; font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--white);
  }
  .login-logo p { color: var(--text-dim); font-size: 0.78rem; margin-top: 0.25rem; }

  .login-field { margin-bottom: 1rem; }
  .login-field label { display: block; font-size: 0.72rem; color: var(--text-dim); margin-bottom: 0.4rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .login-field input {
    width: 100%; padding: 0.75rem 1rem;
    background: rgba(168,216,234,0.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.9rem;
    transition: border-color 0.2s;
  }
  .login-field input:focus { outline: none; border-color: var(--accent); }

  .login-btn {
    width: 100%; padding: 0.85rem;
    background: var(--accent); color: var(--navy);
    border: none; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
    cursor: pointer; margin-top: 0.5rem; transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .login-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .login-error { color: var(--ngv); font-size: 0.78rem; text-align: center; margin-top: 0.75rem; min-height: 1em; }

  /* ── HEADER ── */
  header {
    background: rgba(10,22,40,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .header-icon { font-size: 1.5rem; }
  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.25rem; font-weight: 800;
    letter-spacing: -0.02em; color: var(--white);
  }
  .header-title span { color: var(--accent); }

  .header-right { display: flex; align-items: center; gap: 1rem; }

  .btn-add {
    background: var(--accent); color: var(--navy);
    border: none; border-radius: 8px;
    padding: 0.5rem 1.1rem;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-add:hover { background: var(--accent2); transform: translateY(-1px); }

  .btn-logout {
    background: transparent; color: var(--text-dim);
    border: none; padding: 0.3rem 0.5rem; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 0.68rem;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { color: var(--text); background: var(--border2); }

  /* ── STATS ── */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 1rem; padding: 1.25rem 2rem;
    max-width: 1100px; margin: 0 auto;
  }

  .stat-card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.2rem;
    backdrop-filter: blur(10px);
    display: flex; flex-direction: column; gap: 4px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: rgba(168,216,234,0.3); }
  .stat-label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--white); line-height: 1; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.gv { color: var(--gv); }

  /* ── FILTERS ── */
  .filter-bar {
    padding: 0 2rem 1rem;
    max-width: 1100px; margin: 0 auto;
    display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center;
  }

  .filter-search {
    flex: 1; min-width: 180px; max-width: 280px;
    padding: 0.5rem 0.9rem;
    background: rgba(168,216,234,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem;
    transition: border-color 0.2s;
  }
  .filter-search:focus { outline: none; border-color: var(--accent); }
  .filter-search::placeholder { color: var(--text-dim); }

  .filter-select {
    padding: 0.5rem 0.75rem;
    background: rgba(168,216,234,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem;
    cursor: pointer; transition: border-color 0.2s;
  }
  .filter-select:focus { outline: none; border-color: var(--accent); }
  .filter-select option { background: var(--navy2); }

  .filter-chip {
    padding: 0.45rem 0.85rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 0.78rem;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: var(--navy); font-weight: 500; }

  /* ── VRIEZER TABS ── */
  .vriezer-tabs {
    padding: 0 2rem;
    max-width: 1100px; margin: 0 auto 1rem;
    display: flex; gap: 0.5rem;
  }

  .vriezer-tab {
    padding: 0.6rem 1.5rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim); font-family: 'Syne', sans-serif;
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .vriezer-tab:hover { border-color: var(--accent); color: var(--accent); }
  .vriezer-tab.active {
    background: var(--navy3); border-color: var(--accent);
    color: var(--white);
    box-shadow: 0 0 20px rgba(79,195,247,0.1);
  }
  .vriezer-tab .count {
    background: var(--accent); color: var(--navy);
    border-radius: 10px; padding: 1px 6px;
    font-size: 0.7rem; font-weight: 700;
  }
  .vriezer-tab.active .count { background: rgba(79,195,247,0.3); color: var(--accent); }

  /* ── GRID ── */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    padding: 0 2rem 2rem;
    max-width: 1100px; margin: 0 auto;
  }

  .item-card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.1rem 1.2rem;
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: all 0.2s;
    display: flex; flex-direction: column; gap: 8px;
    position: relative; overflow: hidden;
  }
  .item-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .item-card:hover { border-color: rgba(168,216,234,0.3); transform: translateY(-2px); box-shadow: var(--shadow); }
  .item-card:hover::before { opacity: 1; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-naam {
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 700;
    color: var(--white); line-height: 1.2;
    flex: 1;
  }
  .badge-gv {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em;
    padding: 2px 7px; border-radius: 6px; flex-shrink: 0;
  }
  .badge-gv.gv  { background: rgba(67,233,123,0.15); color: var(--gv); border: 1px solid rgba(67,233,123,0.3); }
  .badge-gv.ngv { background: rgba(247,121,125,0.12); color: var(--ngv); border: 1px solid rgba(247,121,125,0.25); }

  .card-cat {
    font-size: 0.7rem; color: var(--accent); text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
  .card-tag {
    font-size: 0.72rem; color: var(--text-dim);
    background: rgba(168,216,234,0.06);
    border: 1px solid var(--border2);
    border-radius: 6px; padding: 2px 8px;
  }
  .card-tag.hoeveelheid { color: var(--accent2); border-color: rgba(79,195,247,0.2); background: rgba(79,195,247,0.06); }

  .card-datum { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }
  .card-notities { font-size: 0.75rem; color: var(--text-dim); font-style: italic; margin-top: 2px; border-top: 1px solid var(--border2); padding-top: 6px; }

  .empty-state {
    grid-column: 1/-1;
    text-align: center; padding: 4rem 2rem;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 3rem; display: block; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-family: 'Syne', sans-serif; font-size: 1rem; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow), 0 0 60px rgba(0,0,0,0.5);
  }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem; font-weight: 800;
    margin-bottom: 1.5rem; color: var(--white);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .form-group { margin-bottom: 0.9rem; }
  .form-group label {
    display: block; font-size: 0.68rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.35rem;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 0.65rem 0.85rem;
    background: rgba(168,216,234,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .form-group select option { background: var(--navy2); }
  .form-group textarea { resize: vertical; min-height: 72px; }

  /* GV Toggle */
  .gv-toggle { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .gv-btn {
    flex: 1; padding: 0.6rem;
    background: transparent;
    border: none; cursor: pointer;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem;
    color: var(--text-dim); transition: all 0.15s;
  }
  .gv-btn.active-gv  { background: rgba(67,233,123,0.2);  color: var(--gv); }
  .gv-btn.active-ngv { background: rgba(247,121,125,0.15); color: var(--ngv); }

  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: flex-end; }

  .btn-save {
    background: var(--accent); color: var(--navy);
    border: none; border-radius: 8px;
    padding: 0.65rem 1.5rem;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-save:hover { background: var(--accent2); }

  .btn-cancel {
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 0.65rem 1.2rem;
    font-family: 'DM Mono', monospace; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { color: var(--text); border-color: rgba(168,216,234,0.3); }

  .btn-delete {
    background: rgba(247,121,125,0.1); color: var(--ngv);
    border: 1px solid rgba(247,121,125,0.2); border-radius: 8px;
    padding: 0.65rem 1.1rem;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s; margin-right: auto;
  }
  .btn-delete:hover { background: rgba(247,121,125,0.2); }

  /* Confirm delete modal */
  .confirm-modal { max-width: 360px; text-align: center; }
  .confirm-modal .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .confirm-modal h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
  .confirm-modal p { color: var(--text-dim); font-size: 0.82rem; margin-bottom: 1.5rem; }
  .confirm-btns { display: flex; gap: 0.75rem; justify-content: center; }
  .btn-confirm-delete {
    background: var(--ngv); color: white;
    border: none; border-radius: 8px; padding: 0.65rem 1.5rem;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-confirm-delete:hover { opacity: 0.85; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 2000;
    background: var(--navy3); border: 1px solid var(--border);
    color: var(--text); padding: 0.75rem 1.2rem;
    border-radius: 10px; font-size: 0.82rem;
    box-shadow: var(--shadow);
    opacity: 0; transform: translateY(10px);
    transition: all 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(67,233,123,0.4); }
  .toast.error   { border-color: rgba(247,121,125,0.4); }

  /* ── MOBILE ── */
  @media (max-width: 700px) {
    header { padding: 0 1rem; height: 56px; }
    .header-title { font-size: 1rem; }
    .stats-bar { grid-template-columns: repeat(2,1fr); padding: 1rem; gap: 0.6rem; }
    .stat-value { font-size: 1.4rem; }
    .filter-bar { padding: 0 1rem 0.75rem; }
    .vriezer-tabs { padding: 0 1rem; }
    .items-grid { padding: 0 1rem 2rem; grid-template-columns: 1fr; }
    .modal { padding: 1.5rem 1.25rem; border-radius: 16px 16px 0 0; align-self: flex-end; max-height: 95vh; }
    .modal-overlay { align-items: flex-end; padding: 0; }
    .form-row { grid-template-columns: 1fr; }
  }

  @media (max-width: 480px) {
    .btn-add span { display: none; }
    .stats-bar { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="active">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">🧊</span>
      <h1>Diep<span>vriezer</span></h1>
      <p>Inventarisatie</p>
    </div>
    <div class="login-field">
      <label>Gebruikersnaam</label>
      <input type="text" id="lUser" autocomplete="username" placeholder="gebruiker">
    </div>
    <div class="login-field">
      <label>Wachtwoord</label>
      <input type="password" id="lPass" autocomplete="current-password" placeholder="••••••">
    </div>
    <button class="login-btn" onclick="doLogin()">Inloggen</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- HEADER -->
<header id="appHeader" style="display:none">
  <div class="header-left">
    <span class="header-icon">🧊</span>
    <span class="header-title">Diep<span>vriezer</span></span>
  </div>
  <div class="header-right">
    <button class="btn-add" onclick="openAdd()">+ <span>Toevoegen</span></button>
    <button class="btn-logout" onclick="doLogout()">uitloggen</button>
  </div>
</header>

<!-- MAIN -->
<main id="appMain" style="display:none">

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-label">Totaal items</span>
      <span class="stat-value accent" id="sTotaal">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Vriezer 1</span>
      <span class="stat-value" id="sVriezer1">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Vriezer 2</span>
      <span class="stat-value" id="sVriezer2">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Glutenvrij</span>
      <span class="stat-value gv" id="sGV">0</span>
    </div>
  </div>

  <!-- VRIEZER TABS -->
  <div class="vriezer-tabs">
    <button class="vriezer-tab active" data-vriezer="0" onclick="setVriezer(0, this)">
      ❄️ Alle vriezers
    </button>
    <button class="vriezer-tab" data-vriezer="1" onclick="setVriezer(1, this)">
      🧊 Vriezer 1 <span class="count" id="tab1count">0</span>
    </button>
    <button class="vriezer-tab" data-vriezer="2" onclick="setVriezer(2, this)">
      🧊 Vriezer 2 <span class="count" id="tab2count">0</span>
    </button>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <input class="filter-search" type="text" id="fZoek" placeholder="🔍 zoeken…" oninput="loadItems()">
    <select class="filter-select" id="fCatFilter" onchange="loadItems()">
      <option value="">Alle categorieën</option>
      <option value="vlees">🥩 Vlees</option>
      <option value="vis">🐟 Vis</option>
      <option value="groenten">🥦 Groenten</option>
      <option value="fruit">🍓 Fruit</option>
      <option value="snacks">🍟 Snacks</option>
      <option value="soepen">🍲 Soepen</option>
      <option value="brood">🍞 Brood/gebak</option>
      <option value="maaltijden">🍽️ Kant-en-klaar</option>
      <option value="zuivel">🧀 Zuivel/eieren</option>
      <option value="ijs">🍦 IJs/desserts</option>
      <option value="overige">📦 Overige</option>
    </select>
    <select class="filter-select" id="fSorteer" onchange="loadItems()">
      <option value="datum">Datum (nieuwste)</option>
      <option value="naam">Naam A→Z</option>
      <option value="categorie">Categorie</option>
    </select>
    <button class="filter-chip" id="chipGV" onclick="toggleGVFilter()">❄️ Alleen GV</button>
  </div>

  <!-- GRID -->
  <div class="items-grid" id="itemsGrid"></div>

</main>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <h2 id="formTitle">Item toevoegen</h2>

    <div class="form-row">
      <div class="form-group" style="grid-column:1/-1">
        <label>Naam *</label>
        <input type="text" id="fNaam" placeholder="bv. kipfilet, spinazie…">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Categorie *</label>
        <select id="fCat">
          <option value="vlees">🥩 Vlees</option>
          <option value="vis">🐟 Vis</option>
          <option value="groenten">🥦 Groenten</option>
          <option value="fruit">🍓 Fruit</option>
          <option value="snacks">🍟 Snacks</option>
          <option value="soepen">🍲 Soepen</option>
          <option value="brood">🍞 Brood/gebak</option>
          <option value="maaltijden">🍽️ Kant-en-klaar</option>
          <option value="zuivel">🧀 Zuivel/eieren</option>
          <option value="ijs">🍦 IJs/desserts</option>
          <option value="overige">📦 Overige</option>
        </select>
      </div>
      <div class="form-group">
        <label>Vriezer</label>
        <select id="fVriezer">
          <option value="1">🧊 Vriezer 1</option>
          <option value="2">🧊 Vriezer 2</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Hoeveelheid</label>
        <input type="text" id="fHoeveelheid" placeholder="bv. 500">
      </div>
      <div class="form-group">
        <label>Eenheid</label>
        <select id="fEenheid">
          <option value="">–</option>
          <option value="g">gram (g)</option>
          <option value="kg">kilogram (kg)</option>
          <option value="ml">milliliter (ml)</option>
          <option value="l">liter (l)</option>
          <option value="stuks">stuks</option>
          <option value="zakjes">zakjes</option>
          <option value="dozen">dozen</option>
          <option value="porties">porties</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Datum ingevroren</label>
      <input type="date" id="fDatum">
    </div>

    <div class="form-group">
      <label>Gluten</label>
      <div class="gv-toggle">
        <button class="gv-btn active-gv" id="btnGV"  onclick="setGV(true)">✓ GV — Glutenvrij</button>
        <button class="gv-btn" id="btnNGV" onclick="setGV(false)">✗ NGV — Niet glutenvrij</button>
      </div>
    </div>

    <div class="form-group">
      <label>Notities</label>
      <textarea id="fNotities" placeholder="Merk, herkomst, bereidingstips…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-delete" id="btnDelete" style="display:none" onclick="confirmDelete()">Verwijderen</button>
      <button class="btn-cancel" onclick="closeModal('formModal')">Annuleren</button>
      <button class="btn-save" onclick="saveItem()">Opslaan</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal confirm-modal">
    <div class="icon">🗑️</div>
    <h2>Item verwijderen?</h2>
    <p>Dit item wordt permanent verwijderd uit de inventarisatie.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeModal('deleteModal')">Annuleren</button>
      <button class="btn-confirm-delete" onclick="doDelete()">Verwijderen</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let editId = null;
let deleteId = null;
let activeVriezer = 0;
let gvFilter = false;
let isGV = true;

// ── Auth ──────────────────────────────────────────────────────────
async function checkAuth() {
  try {
    const r = await fetch(`${API}/auth/check`);
    const d = await r.json();
    if (d.ok) showApp();
    else showLogin();
  } catch { showLogin(); }
}

function showLogin() {
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('appHeader').style.display = 'none';
  document.getElementById('appMain').style.display = 'none';
  setTimeout(() => document.getElementById('lUser').focus(), 100);
}

function showApp() {
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appHeader').style.display = 'flex';
  document.getElementById('appMain').style.display = 'block';
  loadStats();
  loadItems();
}

async function doLogin() {
  const gebruiker = document.getElementById('lUser').value.trim();
  const wachtwoord = document.getElementById('lPass').value;
  document.getElementById('loginError').textContent = '';
  try {
    const r = await fetch(`${API}/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ gebruiker, wachtwoord })
    });
    if (r.ok) showApp();
    else document.getElementById('loginError').textContent = 'Onjuiste gebruikersnaam of wachtwoord';
  } catch { document.getElementById('loginError').textContent = 'Verbindingsfout'; }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').classList.contains('active')) doLogin();
});

async function doLogout() {
  await fetch(`${API}/logout`, { method: 'POST' });
  showLogin();
}

// ── Stats ─────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const d = await (await fetch(`${API}/statistieken`)).json();
    document.getElementById('sTotaal').textContent   = d.totaal;
    document.getElementById('sVriezer1').textContent = d.vriezer1;
    document.getElementById('sVriezer2').textContent = d.vriezer2;
    document.getElementById('sGV').textContent       = d.gv;
    document.getElementById('tab1count').textContent = d.vriezer1;
    document.getElementById('tab2count').textContent = d.vriezer2;
  } catch {}
}

// ── Filters ───────────────────────────────────────────────────────
function setVriezer(n, el) {
  activeVriezer = n;
  document.querySelectorAll('.vriezer-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadItems();
}

function toggleGVFilter() {
  gvFilter = !gvFilter;
  document.getElementById('chipGV').classList.toggle('active', gvFilter);
  loadItems();
}

// ── Load items ────────────────────────────────────────────────────
const CATEGORIE_EMOJI = {
  vlees:'🥩', vis:'🐟', groenten:'🥦', fruit:'🍓', snacks:'🍟',
  soepen:'🍲', brood:'🍞', maaltijden:'🍽️', zuivel:'🧀', ijs:'🍦', overige:'📦'
};
const CATEGORIE_NAAM = {
  vlees:'Vlees', vis:'Vis', groenten:'Groenten', fruit:'Fruit', snacks:'Snacks',
  soepen:'Soepen', brood:'Brood/gebak', maaltijden:'Kant-en-klaar',
  zuivel:'Zuivel/eieren', ijs:'IJs/desserts', overige:'Overige'
};

function formatDatum(d) {
  if (!d) return null;
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}

async function loadItems() {
  const zoek = document.getElementById('fZoek').value;
  const cat  = document.getElementById('fCatFilter').value;
  const sort = document.getElementById('fSorteer').value;
  const params = new URLSearchParams({ sorteer: sort });
  if (activeVriezer) params.set('vriezer', activeVriezer);
  if (cat)  params.set('categorie', cat);
  if (zoek) params.set('zoek', zoek);
  if (gvFilter) params.set('glutenvrij', '1');

  try {
    const items = await (await fetch(`${API}/items?${params}`)).json();
    renderGrid(items);
  } catch {}
}

function renderGrid(items) {
  const grid = document.getElementById('itemsGrid');
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state"><span class="icon">🧊</span><p>Geen items gevonden</p></div>`;
    return;
  }
  grid.innerHTML = items.map(renderCard).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(item) {
  const emoji = CATEGORIE_EMOJI[item.categorie] || '📦';
  const catNaam = CATEGORIE_NAAM[item.categorie] || item.categorie;
  const gvBadge = item.glutenvrij
    ? `<span class="badge-gv gv">GV</span>`
    : `<span class="badge-gv ngv">NGV</span>`;
  const hoeveelheid = item.hoeveelheid
    ? `<span class="card-tag hoeveelheid">⚖️ ${esc(item.hoeveelheid)}${item.eenheid ? ' '+esc(item.eenheid) : ''}</span>`
    : '';
  const vriezerTag = `<span class="card-tag">🧊 Vriezer ${item.vriezer}</span>`;
  const datum = item.datum_ingevroren
    ? `<div class="card-datum">❄️ ingevroren ${formatDatum(item.datum_ingevroren)}</div>` : '';
  const notities = item.notities
    ? `<div class="card-notities">${esc(item.notities)}</div>` : '';

  return `
    <div class="item-card" onclick="openEdit(${item.id})">
      <div class="card-top">
        <div class="card-naam">${emoji} ${esc(item.naam)}</div>
        ${gvBadge}
      </div>
      <div class="card-cat">${catNaam}</div>
      <div class="card-meta">${vriezerTag}${hoeveelheid}</div>
      ${datum}
      ${notities}
    </div>`;
}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function setGV(val) {
  isGV = val;
  document.getElementById('btnGV').className  = 'gv-btn' + (val  ? ' active-gv'  : '');
  document.getElementById('btnNGV').className = 'gv-btn' + (!val ? ' active-ngv' : '');
}

function openAdd() {
  editId = null;
  document.getElementById('formTitle').textContent = 'Item toevoegen';
  document.getElementById('fNaam').value = '';
  document.getElementById('fCat').value = 'vlees';
  document.getElementById('fVriezer').value = activeVriezer || '1';
  document.getElementById('fHoeveelheid').value = '';
  document.getElementById('fEenheid').value = '';
  document.getElementById('fDatum').value = new Date().toISOString().split('T')[0];
  document.getElementById('fNotities').value = '';
  document.getElementById('btnDelete').style.display = 'none';
  setGV(true);
  openModal('formModal');
  setTimeout(() => document.getElementById('fNaam').focus(), 300);
}

async function openEdit(id) {
  try {
    const item = await (await fetch(`${API}/items/${id}`)).json();
    editId = id;
    document.getElementById('formTitle').textContent = 'Item bewerken';
    document.getElementById('fNaam').value = item.naam || '';
    document.getElementById('fCat').value = item.categorie || 'vlees';
    document.getElementById('fVriezer').value = item.vriezer || '1';
    document.getElementById('fHoeveelheid').value = item.hoeveelheid || '';
    document.getElementById('fEenheid').value = item.eenheid || '';
    document.getElementById('fDatum').value = item.datum_ingevroren || '';
    document.getElementById('fNotities').value = item.notities || '';
    document.getElementById('btnDelete').style.display = 'block';
    setGV(!!item.glutenvrij);
    openModal('formModal');
  } catch { toast('Fout bij laden', 'error'); }
}

async function saveItem() {
  const naam = document.getElementById('fNaam').value.trim();
  if (!naam) { toast('Naam is verplicht', 'error'); return; }

  const body = {
    naam,
    categorie: document.getElementById('fCat').value,
    vriezer: parseInt(document.getElementById('fVriezer').value),
    glutenvrij: isGV,
    hoeveelheid: document.getElementById('fHoeveelheid').value.trim(),
    eenheid: document.getElementById('fEenheid').value,
    datum_ingevroren: document.getElementById('fDatum').value || null,
    notities: document.getElementById('fNotities').value.trim(),
  };

  try {
    const url = editId ? `${API}/items/${editId}` : `${API}/items`;
    const method = editId ? 'PUT' : 'POST';
    await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    closeModal('formModal');
    toast(editId ? 'Item bijgewerkt ✓' : 'Item toegevoegd ✓', 'success');
    setTimeout(() => { loadItems(); loadStats(); }, 150);
  } catch { toast('Fout bij opslaan', 'error'); }
}

function confirmDelete() {
  deleteId = editId;
  closeModal('formModal');
  setTimeout(() => openModal('deleteModal'), 150);
}

async function doDelete() {
  if (!deleteId) return;
  try {
    await fetch(`${API}/items/${deleteId}`, { method: 'DELETE' });
    closeModal('deleteModal');
    deleteId = null;
    toast('Item verwijderd', 'success');
    setTimeout(() => { loadItems(); loadStats(); }, 150);
  } catch { toast('Fout bij verwijderen', 'error'); }
}

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// Start
checkAuth();
</script>
</body>
</html>
