<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Vriezer">
<meta name="theme-color" content="#ddeef8">
<title>Diepvriezer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky:        #ddeef8;
  --sky2:       #c5e2f5;
  --sky3:       #aad2ee;
  --ice:        #e8f5fb;
  --ice2:       #f4fafd;
  --snow:       #ffffff;
  --navy:       #1a3a5c;
  --navy2:      #0f2540;
  --mid:        #3a6fa0;
  --soft:       #5b8db8;
  --accent:     #2e86c1;
  --accent2:    #1a6fa8;
  --aurora:     #4ecdc4;
  --gv:         #27ae60;
  --ngv:        #e74c3c;
  --glass:      rgba(255,255,255,0.65);
  --glass2:     rgba(255,255,255,0.45);
  --border:     rgba(100,160,210,0.25);
  --border2:    rgba(100,160,210,0.12);
  --text:       #1a3a5c;
  --text2:      #3a6080;
  --text3:      #7aa0be;
  --shadow:     0 4px 24px rgba(30,80,140,0.12);
  --shadow2:    0 2px 12px rgba(30,80,140,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;font-family:'Nunito',sans-serif;color:var(--text);overflow-x:hidden;}

/* ═══ ARCTIC DAY BACKGROUND ═══ */
body {
  background: linear-gradient(180deg,
    #c8e8f8 0%,
    #d8eef8 20%,
    #e4f3fb 45%,
    #edf7fc 65%,
    #f2f9fd 80%,
    #f8fcfe 100%
  );
  min-height:100vh; position:relative;
}
/* Soft sky glow */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 100% 50% at 50% -5%, rgba(180,225,250,0.6) 0%, transparent 60%),
    radial-gradient(ellipse 60% 30% at 20% 0%,   rgba(200,235,255,0.4) 0%, transparent 50%),
    radial-gradient(ellipse 60% 30% at 80% 0%,   rgba(200,235,255,0.4) 0%, transparent 50%);
}
body > *{position:relative;z-index:1;}
.landscape,.snowflakes{z-index:0;}

/* ═══ SNOWFLAKES ═══ */
.snowflakes{
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
}
.sf{
  position:absolute; top:-60px;
  color:rgba(150,200,235,0.55);
  font-size:1.2rem; line-height:1;
  animation:fall linear infinite;
  user-select:none;
}
.sf:nth-child(1) {left:5%;  animation-duration:12s; animation-delay:0s;   font-size:.9rem; color:rgba(150,200,235,0.4);}
.sf:nth-child(2) {left:15%; animation-duration:16s; animation-delay:2s;   font-size:1.4rem;}
.sf:nth-child(3) {left:28%; animation-duration:10s; animation-delay:5s;   font-size:.7rem; color:rgba(150,200,235,0.3);}
.sf:nth-child(4) {left:42%; animation-duration:14s; animation-delay:1s;   font-size:1.1rem;}
.sf:nth-child(5) {left:55%; animation-duration:11s; animation-delay:3.5s; font-size:.8rem; color:rgba(150,200,235,0.35);}
.sf:nth-child(6) {left:68%; animation-duration:18s; animation-delay:0.5s; font-size:1.5rem; color:rgba(150,200,235,0.3);}
.sf:nth-child(7) {left:78%; animation-duration:13s; animation-delay:4s;   font-size:.9rem;}
.sf:nth-child(8) {left:88%; animation-duration:15s; animation-delay:7s;   font-size:1.2rem; color:rgba(150,200,235,0.4);}
.sf:nth-child(9) {left:95%; animation-duration:9s;  animation-delay:2.5s; font-size:.6rem;}
@keyframes fall{
  0%  {transform:translateY(0) rotate(0deg);   opacity:0;}
  5%  {opacity:1;}
  95% {opacity:0.6;}
  100%{transform:translateY(110vh) rotate(360deg); opacity:0;}
}

/* ═══ LANDSCAPE SVG ═══ */
.landscape{position:fixed;bottom:0;left:0;right:0;z-index:0;pointer-events:none;}

/* ═══ LOGIN ═══ */
#loginScreen{display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;background:rgba(180,220,245,0.4);backdrop-filter:blur(8px);}
#loginScreen.active{display:flex;}
.login-box{
  width:400px; padding:2.75rem 2.5rem;
  background:var(--glass); backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.8); border-radius:24px;
  box-shadow:var(--shadow),0 0 0 1px rgba(255,255,255,0.5);
}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-bear{font-size:3.5rem;display:block;margin-bottom:.5rem;animation:wobble 3s ease-in-out infinite;}
@keyframes wobble{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
.login-logo h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--navy);line-height:1;}
.login-logo h1 em{font-style:italic;color:var(--accent);}
.login-logo p{color:var(--text3);font-size:.78rem;margin-top:.3rem;letter-spacing:.08em;text-transform:uppercase;}
.lf{margin-bottom:1rem;}
.lf label{display:block;font-size:.72rem;font-weight:700;color:var(--text2);margin-bottom:.4rem;letter-spacing:.08em;text-transform:uppercase;}
.lf input{width:100%;padding:.75rem 1rem;background:rgba(255,255,255,0.8);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.95rem;transition:all .2s;}
.lf input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,134,193,0.1);}
.login-btn{width:100%;padding:.85rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;margin-top:.5rem;transition:all .25s;box-shadow:0 4px 16px rgba(46,134,193,0.3);}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(46,134,193,0.4);}
.login-err{color:var(--ngv);font-size:.8rem;text-align:center;margin-top:.75rem;min-height:1.2em;}

/* ═══ HEADER ═══ */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,0.75);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.9);
  padding:0 2rem;height:66px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 16px rgba(30,80,140,0.08);
}
.h-brand{display:flex;align-items:center;gap:.7rem;}
.h-bear{font-size:1.7rem;}
.h-brand h1{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;color:var(--navy);line-height:1;}
.h-brand h1 em{font-style:italic;color:var(--accent);}
.h-right{display:flex;align-items:center;gap:.9rem;}
.btn-add{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:.5rem 1.25rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;box-shadow:0 2px 10px rgba(46,134,193,0.25);}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(46,134,193,0.35);}
.btn-logout{background:transparent;color:var(--text3);border:none;padding:.3rem .5rem;border-radius:8px;font-family:'Nunito',sans-serif;font-size:.72rem;cursor:pointer;transition:all .2s;}
.btn-logout:hover{color:var(--text2);}

/* ═══ MAIN ═══ */
.wrap{max-width:1140px;margin:0 auto;padding:0 2rem 5rem;}

/* ═══ STATS ═══ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;padding:1.5rem 0 1.1rem;}
.stat-card{
  background:var(--glass);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.85);border-radius:18px;
  padding:1.1rem 1.3rem;transition:all .25s;
  box-shadow:var(--shadow2);
}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.stat-icon{font-size:1.8rem;margin-bottom:.5rem;display:block;}
.stat-val{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;line-height:1;color:var(--navy);}
.stat-val.ca{color:var(--accent);}
.stat-val.cg{color:var(--gv);}
.stat-lbl{font-size:.7rem;font-weight:700;color:var(--text3);margin-top:.3rem;text-transform:uppercase;letter-spacing:.08em;}

/* ═══ TABS ═══ */
.fz-tabs{display:flex;gap:.5rem;margin-bottom:1.2rem;background:rgba(255,255,255,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.9);border-radius:16px;padding:.35rem;width:fit-content;box-shadow:var(--shadow2);}
.fz-tab{padding:.5rem 1.3rem;border-radius:12px;background:transparent;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;font-size:.88rem;color:var(--text3);transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.fz-tab:hover{color:var(--text2);}
.fz-tab.active{background:var(--snow);color:var(--navy);box-shadow:0 2px 10px rgba(30,80,140,0.1);border:1px solid rgba(255,255,255,0.9);}
.fz-cnt{background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:.68rem;font-weight:700;line-height:1.6;}
.fz-tab.active .fz-cnt{background:var(--sky3);color:var(--navy);}

/* Freezer custom icons */
.icon-bosch{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:5px;
  background:linear-gradient(135deg,#2980b9,#1a5f8a);
  color:#fff;font-size:10px;font-weight:800;font-family:'Nunito',sans-serif;
  letter-spacing:-0.5px;flex-shrink:0;
}
.icon-kist{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:5px;
  background:linear-gradient(135deg,#27ae60,#1a7a45);
  color:#fff;font-size:10px;font-weight:800;font-family:'Nunito',sans-serif;
  letter-spacing:-0.5px;flex-shrink:0;
}

/* ═══ FILTERS ═══ */
.filter-bar{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:1.4rem;align-items:center;}
.fi{flex:1;min-width:160px;max-width:260px;padding:.55rem 1rem;background:rgba(255,255,255,0.75);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.85rem;transition:all .2s;}
.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,134,193,0.08);}
.fi::placeholder{color:var(--text3);}
.fs{padding:.55rem .85rem;background:rgba(255,255,255,0.75);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;}
.fs:focus{outline:none;border-color:var(--accent);}
.chip{padding:.48rem 1rem;border-radius:20px;border:1.5px solid var(--border);background:rgba(255,255,255,0.7);color:var(--text2);font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;}
.chip:hover{border-color:var(--gv);color:var(--gv);}
.chip.on{background:rgba(39,174,96,0.1);border-color:rgba(39,174,96,0.4);color:var(--gv);}

/* ═══ GV GRAIN SVG ICON ═══ */
.gv-icon{display:inline-block;vertical-align:middle;width:18px;height:18px;}

/* ═══ GRID ═══ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem;}
.card{
  background:var(--glass);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.85);border-radius:20px;
  cursor:pointer;transition:all .25s;
  box-shadow:var(--shadow2);
  display:flex;flex-direction:column;overflow:hidden;
}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow),0 0 0 1px rgba(46,134,193,0.1);}

/* Card photo */
.card-photo{width:100%;height:130px;object-fit:cover;background:var(--sky);display:block;}
.card-photo-placeholder{
  width:100%;height:0;overflow:hidden;transition:height .2s;
}
.card-photo-placeholder.has-photo{height:130px;}

.card-body{padding:1.1rem 1.2rem;display:flex;flex-direction:column;gap:8px;}
.c-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.c-naam{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--navy);line-height:1.2;flex:1;}
.bdg{font-family:'Nunito',sans-serif;font-size:.62rem;font-weight:700;padding:3px 7px;border-radius:7px;letter-spacing:.05em;flex-shrink:0;margin-top:2px;display:flex;align-items:center;gap:3px;}
.bdg.gv {background:rgba(39,174,96,.12); color:var(--gv);  border:1.5px solid rgba(39,174,96,.3);}
.bdg.ngv{background:rgba(231,76,60,.08); color:var(--ngv); border:1.5px solid rgba(231,76,60,.2);}
.c-cat{font-size:.7rem;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.1em;}
.c-tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:.74rem;padding:3px 9px;border-radius:8px;background:rgba(46,134,193,0.07);border:1px solid var(--border2);color:var(--text2);font-weight:500;}
.tag.qty{color:var(--accent);border-color:rgba(46,134,193,0.2);background:rgba(46,134,193,0.08);}
.tag.bosch{color:#1a5f8a;background:rgba(41,128,185,0.1);border-color:rgba(41,128,185,0.25);}
.tag.kist {color:#1a7a45;background:rgba(39,174,96,0.1);border-color:rgba(39,174,96,0.25);}
.c-datum{font-size:.73rem;color:var(--text3);font-weight:500;}
.c-datum span{color:var(--text2);}
.c-note{font-size:.76rem;color:var(--text3);font-style:italic;border-top:1px solid var(--border2);padding-top:7px;line-height:1.4;}

.empty{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--text3);}
.empty .big{font-size:4rem;display:block;margin-bottom:1.2rem;opacity:.4;}
.empty p{font-family:'Playfair Display',serif;font-size:1.3rem;font-style:italic;color:var(--text2);}

/* ═══ MODAL ═══ */
.ov{display:none;position:fixed;inset:0;z-index:500;background:rgba(150,200,235,0.35);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:1rem;}
.ov.open{display:flex;}
.modal{
  background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.95);border-radius:24px;
  padding:2.25rem;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;
  box-shadow:0 16px 64px rgba(30,80,140,0.18);
}
.modal h2{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--navy);margin-bottom:1.5rem;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
.fg{margin-bottom:.9rem;}
.fg label{display:block;font-size:.7rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.38rem;}
.fg input,.fg select,.fg textarea{width:100%;padding:.68rem .9rem;background:rgba(255,255,255,0.9);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.88rem;transition:all .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,134,193,0.08);}
.fg textarea{resize:vertical;min-height:72px;}

/* GV Toggle */
.gv-toggle{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);}
.gv-btn{flex:1;padding:.62rem .5rem;background:transparent;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;font-size:.82rem;color:var(--text3);transition:all .18s;display:flex;align-items:center;justify-content:center;gap:5px;}
.gv-btn+.gv-btn{border-left:1.5px solid var(--border);}
.gv-btn.og{background:rgba(39,174,96,.1);color:var(--gv);}
.gv-btn.on{background:rgba(231,76,60,.07);color:var(--ngv);}

/* ═══ PHOTO UPLOAD ═══ */
.foto-zone{
  border:2px dashed var(--border);border-radius:12px;
  padding:1rem; cursor:pointer; transition:all .2s;
  display:flex;align-items:center;gap:.8rem;
  background:rgba(255,255,255,0.6);
  position:relative;overflow:hidden;
}
.foto-zone:hover{border-color:var(--accent);background:rgba(46,134,193,0.04);}
.foto-zone.has-photo{border-style:solid;border-color:rgba(46,134,193,0.3);padding:0;display:block;}
.foto-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;}
.foto-preview{width:100%;height:160px;object-fit:cover;border-radius:10px;display:block;}
.foto-placeholder{display:flex;align-items:center;gap:.8rem;pointer-events:none;}
.foto-cam{font-size:1.8rem;color:var(--text3);}
.foto-txt{font-size:.82rem;color:var(--text3);line-height:1.4;}
.foto-txt strong{display:block;color:var(--text2);font-weight:600;margin-bottom:1px;}
.foto-clear{
  position:absolute;top:6px;right:6px;z-index:2;
  background:rgba(255,255,255,0.9);border:1px solid var(--border);
  border-radius:6px;padding:2px 7px;font-size:.72rem;font-weight:700;
  color:var(--ngv);cursor:pointer;transition:all .2s;
}
.foto-clear:hover{background:rgba(231,76,60,.1);}

/* Modal actions */
.m-actions{display:flex;gap:.7rem;margin-top:1.75rem;justify-content:flex-end;align-items:center;}
.btn-save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:.7rem 1.75rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;box-shadow:0 3px 12px rgba(46,134,193,0.3);}
.btn-save:hover{transform:translateY(-1px);}
.btn-cancel{background:transparent;color:var(--text3);border:1.5px solid var(--border);border-radius:10px;padding:.7rem 1.2rem;font-family:'Nunito',sans-serif;font-size:.88rem;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{color:var(--text2);}
.btn-del{margin-right:auto;background:rgba(231,76,60,.07);color:var(--ngv);border:1.5px solid rgba(231,76,60,.2);border-radius:10px;padding:.7rem 1rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s;}
.btn-del:hover{background:rgba(231,76,60,.13);}
.modal-c{max-width:380px;text-align:center;}
.modal-c .bi{font-size:3rem;margin-bottom:.75rem;display:block;}
.modal-c h2{font-size:1.35rem;margin-bottom:.5rem;}
.modal-c p{color:var(--text3);font-size:.84rem;margin-bottom:1.75rem;line-height:1.5;}
.c-btns{display:flex;gap:.75rem;justify-content:center;}
.btn-cd{background:var(--ngv);color:#fff;border:none;border-radius:10px;padding:.7rem 1.75rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;}
.btn-cd:hover{opacity:.85;}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:1.75rem;right:1.75rem;z-index:3000;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border:1.5px solid var(--border);color:var(--text);padding:.8rem 1.4rem;border-radius:12px;font-size:.85rem;font-weight:600;box-shadow:var(--shadow);opacity:0;transform:translateY(12px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{border-color:rgba(39,174,96,.4);color:var(--gv);}
.toast.error  {border-color:rgba(231,76,60,.3);color:var(--ngv);}

/* ═══ MOBILE ═══ */
@media(max-width:700px){
  header{padding:0 1rem;height:58px;} .h-brand h1{font-size:1.2rem;}
  .wrap{padding:0 1rem 3rem;}
  .stats-row{grid-template-columns:repeat(2,1fr);padding:1rem 0;}
  .stat-val{font-size:1.8rem;}
  .grid{grid-template-columns:1fr;}
  .ov{align-items:flex-end;padding:0;}
  .modal{border-radius:20px 20px 0 0;align-self:flex-end;max-height:95vh;padding:1.75rem 1.5rem;}
  .r2{grid-template-columns:1fr;}
  .fz-tabs{flex-wrap:wrap;width:100%;}
}
@media(max-width:430px){.btn-add span{display:none;}}
</style>
</head>
<body>

<!-- Snowflakes -->
<div class="snowflakes" aria-hidden="true">
  <div class="sf">❄</div><div class="sf">❅</div><div class="sf">❆</div>

<!-- Hidden canvas for image resize -->
<canvas id="resizeCanvas" style="display:none"></canvas>

<script>
const API='/api';
let editId=null,deleteId=null,activeVriezer=0,gvOnly=false,isGV=true;
let fotoData=null; // base64 compressed photo

// ── FOTO ──────────────────────────────────────────────────────────
function triggerFoto(){
  if(fotoData) return; // already has photo, click clear instead
  document.getElementById('fFotoInput').click();
}

function handleFoto(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    // Resize to max 600px via canvas to save memory
    const img=new Image();
    img.onload=function(){
      const MAX=600;
      let w=img.width, h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*MAX/w);w=MAX;}
        else{w=Math.round(w*MAX/h);h=MAX;}
      }
      const canvas=document.getElementById('resizeCanvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      // JPEG quality 0.72 = good quality, small size (~30-60KB)
      fotoData=canvas.toDataURL('image/jpeg',0.72);
      showFotoPreview(fotoData);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function showFotoPreview(src){
  const zone=document.getElementById('fotoZone');
  const placeholder=document.getElementById('fotoPlaceholder');
  const preview=document.getElementById('fFotoPreview');
  const clear=document.getElementById('fotoClear');
  zone.classList.add('has-photo');
  placeholder.style.display='none';
  preview.src=src;
  preview.style.display='block';
  clear.style.display='block';
}

function clearFoto(e){
  e.stopPropagation();
  fotoData=null;
  const zone=document.getElementById('fotoZone');
  const placeholder=document.getElementById('fotoPlaceholder');
  const preview=document.getElementById('fFotoPreview');
  const clear=document.getElementById('fotoClear');
  zone.classList.remove('has-photo');
  placeholder.style.display='flex';
  preview.src=''; preview.style.display='none';
  clear.style.display='none';
  document.getElementById('fFotoInput').value='';
}

function resetFoto(){
  fotoData=null;
  const zone=document.getElementById('fotoZone');
  zone.classList.remove('has-photo');
  document.getElementById('fotoPlaceholder').style.display='flex';
  const preview=document.getElementById('fFotoPreview');
  preview.src=''; preview.style.display='none';
  document.getElementById('fotoClear').style.display='none';
  document.getElementById('fFotoInput').value='';
}

// ── AUTH ──────────────────────────────────────────────────────────
async function checkAuth(){
  try{ const d=await(await fetch(`${API}/auth/check`)).json(); d.ok?showApp():showLogin(); }
  catch{ showLogin(); }
}
function showLogin(){
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('appHeader').style.display='none';
  document.getElementById('appMain').style.display='none';
  setTimeout(()=>document.getElementById('lUser').focus(),150);
}
function showApp(){
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appHeader').style.display='flex';
  document.getElementById('appMain').style.display='block';
  loadStats(); loadItems();
}
async function doLogin(){
  const u=document.getElementById('lUser').value.trim(), p=document.getElementById('lPass').value;
  document.getElementById('loginErr').textContent='';
  try{
    const r=await fetch(`${API}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({gebruiker:u,wachtwoord:p})});
    r.ok?showApp():(document.getElementById('loginErr').textContent='Onjuiste gegevens');
  }catch{ document.getElementById('loginErr').textContent='Verbindingsfout'; }
}
document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&document.getElementById('loginScreen').classList.contains('active')) doLogin(); });
async function doLogout(){ await fetch(`${API}/logout`,{method:'POST'}); showLogin(); }

// ── STATS ─────────────────────────────────────────────────────────
async function loadStats(){
  try{
    const d=await(await fetch(`${API}/statistieken`)).json();
    document.getElementById('sTotaal').textContent=d.totaal;
    document.getElementById('sBosch').textContent=d.vriezer1;
    document.getElementById('sKist').textContent=d.vriezer2;
    document.getElementById('sGV').textContent=d.gv;
    document.getElementById('cBosch').textContent=d.vriezer1;
    document.getElementById('cKist').textContent=d.vriezer2;
  }catch{}
}

function setVriezer(n,el){
  activeVriezer=n;
  document.querySelectorAll('.fz-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); loadItems();
}
function toggleGV(){
  gvOnly=!gvOnly;
  document.getElementById('chipGV').classList.toggle('on',gvOnly);
  loadItems();
}

// ── GV ICON SVG inline ────────────────────────────────────────────
const GV_SVG=`<svg width="15" height="15" viewBox="0 0 28 28" fill="none" style="vertical-align:middle;margin-right:2px">
  <line x1="14" y1="22" x2="14" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="14" cy="9.5" rx="2.5" ry="1.4" fill="currentColor"/>
  <ellipse cx="11.2" cy="12" rx="2.2" ry="1.2" fill="currentColor" transform="rotate(-25 11.2 12)"/>
  <ellipse cx="16.8" cy="12" rx="2.2" ry="1.2" fill="currentColor" transform="rotate(25 16.8 12)"/>
  <ellipse cx="11.8" cy="14.8" rx="2" ry="1.1" fill="currentColor" transform="rotate(-20 11.8 14.8)"/>
  <ellipse cx="16.2" cy="14.8" rx="2" ry="1.1" fill="currentColor" transform="rotate(20 16.2 14.8)"/>
  <line x1="4" y1="24" x2="24" y2="4" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>
</svg>`;

const CATE={vlees:'🥩 Vlees',vis:'🐟 Vis',groenten:'🥦 Groenten',fruit:'🍓 Fruit',snacks:'🍟 Snacks',soepen:'🍲 Soepen',brood:'🍞 Brood/gebak',maaltijden:'🍽️ Kant-en-klaar',zuivel:'🧀 Zuivel/eieren',ijs:'🍦 IJs/desserts',overige:'📦 Overige'};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fd(d){if(!d)return null;const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`;}

async function loadItems(){
  const params=new URLSearchParams({sorteer:document.getElementById('fSort').value});
  if(activeVriezer) params.set('vriezer',activeVriezer);
  const cat=document.getElementById('fCatF').value; if(cat) params.set('categorie',cat);
  const zoek=document.getElementById('fZoek').value; if(zoek) params.set('zoek',zoek);
  if(gvOnly) params.set('glutenvrij','1');
  try{
    const items=await(await fetch(`${API}/items?${params}`)).json();
    const g=document.getElementById('grid');
    if(!items.length){
      g.innerHTML=`<div class="empty"><span class="big">🐻‍❄️</span><p>Geen items gevonden</p></div>`;
      return;
    }
    g.innerHTML=items.map(i=>{
      const vLabel=i.vriezer===1?'Bosch':'Kist';
      const vClass=i.vriezer===1?'bosch':'kist';
      const vIcon=i.vriezer===1?'<span class="icon-bosch" style="width:16px;height:16px;font-size:8px;border-radius:4px">❄</span>':'<span class="icon-kist" style="width:16px;height:16px;font-size:8px;border-radius:4px">K</span>';
      const badge=i.glutenvrij
        ?`<span class="bdg gv">${GV_SVG}GV</span>`
        :`<span class="bdg ngv">✗ NGV</span>`;
      const qty=i.hoeveelheid?`<span class="tag qty">⚖️ ${esc(i.hoeveelheid)}${i.eenheid?' '+esc(i.eenheid):''}</span>`:'';
      const datum=i.datum_ingevroren?`<div class="c-datum">❄️ ingevroren <span>${fd(i.datum_ingevroren)}</span></div>`:'';
      const note=i.notities?`<div class="c-note">${esc(i.notities)}</div>`:'';
      const photo=i.foto?`<img class="card-photo" src="${i.foto}" alt="${esc(i.naam)}" loading="lazy">`:'';
      const catLabel=(CATE[i.categorie]||i.categorie).replace(/^[^\s]+\s/,'');
      const catEmoji=CATE[i.categorie]?.split(' ')[0]||'📦';
      return`<div class="card" onclick="openEdit(${i.id})">
        ${photo}
        <div class="card-body">
          <div class="c-head"><div class="c-naam">${catEmoji} ${esc(i.naam)}</div>${badge}</div>
          <div class="c-cat">${catLabel}</div>
          <div class="c-tags"><span class="tag ${vClass}">${vIcon} ${vLabel}</span>${qty}</div>
          ${datum}${note}
        </div>
      </div>`;
    }).join('');
  }catch{}
}

// ── MODAL ─────────────────────────────────────────────────────────
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}

function setGV(val){
  isGV=val;
  document.getElementById('bGV').className='gv-btn'+(val?' og':'');
  document.getElementById('bNGV').className='gv-btn'+(!val?' on':'');
}

function openAdd(){
  editId=null;
  document.getElementById('fTitle').textContent='Item toevoegen';
  document.getElementById('fNaam').value='';
  document.getElementById('fCat').value='vlees';
  document.getElementById('fVriezer').value=activeVriezer||'1';
  document.getElementById('fHoev').value='';
  document.getElementById('fEenh').value='';
  document.getElementById('fDatum').value=new Date().toISOString().split('T')[0];
  document.getElementById('fNote').value='';
  document.getElementById('bDel').style.display='none';
  resetFoto();
  setGV(true); openOv('fModal');
  setTimeout(()=>document.getElementById('fNaam').focus(),300);
}

async function openEdit(id){
  try{
    const i=await(await fetch(`${API}/items/${id}`)).json();
    editId=id;
    document.getElementById('fTitle').textContent='Item bewerken';
    document.getElementById('fNaam').value=i.naam||'';
    document.getElementById('fCat').value=i.categorie||'vlees';
    document.getElementById('fVriezer').value=i.vriezer||'1';
    document.getElementById('fHoev').value=i.hoeveelheid||'';
    document.getElementById('fEenh').value=i.eenheid||'';
    document.getElementById('fDatum').value=i.datum_ingevroren||'';
    document.getElementById('fNote').value=i.notities||'';
    document.getElementById('bDel').style.display='block';
    resetFoto();
    if(i.foto){ fotoData=i.foto; showFotoPreview(i.foto); }
    setGV(!!i.glutenvrij); openOv('fModal');
  }catch{ toast('Fout bij laden','error'); }
}

async function saveItem(){
  const naam=document.getElementById('fNaam').value.trim();
  if(!naam){toast('Naam is verplicht','error');return;}
  const body={
    naam, categorie:document.getElementById('fCat').value,
    vriezer:parseInt(document.getElementById('fVriezer').value),
    glutenvrij:isGV,
    hoeveelheid:document.getElementById('fHoev').value.trim(),
    eenheid:document.getElementById('fEenh').value,
    datum_ingevroren:document.getElementById('fDatum').value||null,
    notities:document.getElementById('fNote').value.trim(),
    foto:fotoData||null
  };
  try{
    await fetch(editId?`${API}/items/${editId}`:`${API}/items`,{
      method:editId?'PUT':'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    closeOv('fModal'); toast(editId?'Opgeslagen ✓':'Toegevoegd ✓','success');
    setTimeout(()=>{loadItems();loadStats();},150);
  }catch{ toast('Fout bij opslaan','error'); }
}

function confirmDel(){deleteId=editId;closeOv('fModal');setTimeout(()=>openOv('dModal'),150);}
async function doDelete(){
  if(!deleteId)return;
  try{
    await fetch(`${API}/items/${deleteId}`,{method:'DELETE'});
    closeOv('dModal'); deleteId=null; toast('Verwijderd','success');
    setTimeout(()=>{loadItems();loadStats();},150);
  }catch{ toast('Fout bij verwijderen','error'); }
}

let tt;
function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${type} show`;
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2600);
}
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

checkAuth();
</script>
</body>
</html>
